name: Build FAQ

on:
  push:
    branches:
      - main
    paths:
      - 'faq/questions/**'
      - 'build-faq.js'
      - 'package.json'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build FAQ
        run: |
          echo "Generating faq/index.html from markdown..."
          node build-faq.js
          echo "✅ FAQ page generated"
          ls -lah faq/index.html
          wc -l faq/index.html
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: faq-index
          path: faq/index.html
          retention-days: 1
