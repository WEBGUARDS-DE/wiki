name: Build FAQ

on:
  push:
    branches:
      - main
    paths:
      - 'faq/questions/**'
      - 'build-faq.js'
      - 'package.json'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build FAQ
        run: |
          echo "Generating faq/index.html from markdown..."
          node build-faq.js
          echo "✅ FAQ page generated"
          ls -lah faq/index.html
      
      - name: Commit and push with PAT
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [ ! -f "faq/index.html" ]; then
            echo "ERROR: faq/index.html nicht generiert!"
            exit 1
          fi
          
          git add faq/index.html
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "build(faq): auto-generated from markdown"
            echo "Pushing with PAT..."
            git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git HEAD:main
          fi
