name: Build FAQ

on:
  push:
    branches:
      - main
    paths:
      - 'faq/questions/**'
      - 'build-faq.js'
      - 'package.json'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build FAQ
        run: |
          echo "Starting FAQ build..."
          node build-faq.js
          echo "FAQ build completed"
          ls -lah faq/index.html
      
      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [ ! -f "faq/index.html" ]; then
            echo "ERROR: faq/index.html wurde nicht generiert!"
            exit 1
          fi
          
          echo "Adding faq/index.html to git..."
          git add faq/index.html
          
          echo "Checking git status..."
          git status
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            echo "Committing changes..."
            git commit -m "build(faq): auto-generated from markdown"
            echo "Pushing to GitHub..."
            # Versuche mit GITHUB_TOKEN – sollte mit write-permissions funktionieren
            git push || {
              echo "Push failed. Trying alternative..."
              git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git HEAD:main
            }
          fi
